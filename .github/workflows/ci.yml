name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: fuzz (smoke)
        run: go test ./internal/format -run xxx -fuzz FuzzParse -fuzztime 20s
