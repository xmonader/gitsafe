name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.8.0

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: fuzz envelope (smoke)
        run: go test ./internal/format -run xxx -fuzz FuzzParse -fuzztime 20s
      - name: fuzz policy (smoke)
        run: |
          go test ./internal/policy -run xxx -fuzz FuzzPolicyMethods -fuzztime 20s
          go test ./internal/policy -run xxx -fuzz FuzzStoreVerify -fuzztime 20s
