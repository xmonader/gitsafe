# golangci-lint configuration for gitsafe.
# Run: golangci-lint run ./...
version: "2"

linters:
  # Keep the default set (errcheck, govet, ineffassign, staticcheck, unused).
  settings:
    errcheck:
      # These return errors only on conditions we deliberately ignore: cleanup
      # (Remove/RemoveAll), best-effort lock release (Flock LOCK_UN), closing a
      # descriptor we are done with, and writing prompts/diagnostics to a tty.
      # An error on any of them changes nothing the caller can act on.
      exclude-functions:
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - os.Remove
        - os.RemoveAll
        - syscall.Flock

  exclusions:
    rules:
      # Test code asserts failures via t.Fatal; unchecked errors there are noise.
      - path: _test\.go
        linters:
          - errcheck
