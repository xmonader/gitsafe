# GoReleaser configuration for gitsafe.
# Validate locally:  goreleaser check
# Dry-run a build:   goreleaser release --snapshot --clean
version: 2

project_name: gitsafe

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: gitsafe
    main: ./cmd/gitsafe
    binary: gitsafe
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*
      - docs/**/*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  name_template: "gitsafe {{ .Tag }}"
  footer: |
    ---
    Verify the download against `checksums.txt`. See the
    [User Guide](https://github.com/xmonader/gitsafe/blob/main/docs/userguide.md)
    and [Threat Model](https://github.com/xmonader/gitsafe/blob/main/docs/threat-model.md).
